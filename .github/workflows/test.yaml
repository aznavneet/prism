name: PRISM CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

permissions:
  contents: read
  pull-requests: write

jobs:

  build:

    if: contains(
      github.event.pull_request.labels.*.name,
      'build:run'
      )

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Verify Maven Wrapper
        run: chmod +x mvnw

      - name: Initialize CI Log
        run: |
          touch ci.log
          echo "===== CI PIPELINE START =====" > ci.log

      - name: Build Application
        id: build
        continue-on-error: true
        run: |
              echo "===== MAVEN BUILD =====" >> ci.log
              mvn clean package 2>&1 | tee -a ci.log


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
         username: ${{ secrets.DOCKERHUB_USERNAME }}
         password: ${{ secrets.DOCKERHUB_TOKEN }}

# Login to Docker Hub

      - name: Login to Docker Hub
        if: steps.build.outcome == 'success'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

# Docker Build + Push with unified logging

      - name: Build and Push Docker Image
        id: docker
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          echo "" >> ci.log
          echo "===== DOCKER BUILD =====" >> ci.log

          docker build \
            -f Dockerfile \
            -t aznavneet/prism:latest \
            . 2>&1 | tee -a ci.log

          echo "" >> ci.log
          echo "===== DOCKER PUSH =====" >> ci.log

          docker push \
            aznavneet/prism:latest \
            2>&1 | tee -a ci.log

       
          

      - name: Upload CI Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-log
          path: ci.log

      - name: Install Gemini SDK
        if: always()  ##in reality it will run only when the build fails, but we want to run it always to ensure the SDK is available for RCA generation
        run: |
           python -m pip install --upgrade pip
           pip install google-generativeai


      - name: Generate RCA
        if: always() 
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/failure_analysis.py


      - name: Publish RCA Summary
        if: always()
        run: |
          echo "## 🚨 PRISM RCA Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat rca_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Verify RCA File
        if: always()
        run: |
           pwd
           ls -la
           cat rca.md

      - name: Rename RCA
        run: |
         SHORT_SHA=$(git rev-parse --short HEAD)
         mv rca.md ci-rca-${SHORT_SHA}.md

      - name: Upload RCA
        uses: actions/upload-artifact@v4
        with:
            name: rca-${{ github.sha }}
            path: ci-rca-*.md

      - name: Send RCA Email
        uses: dawidd6/action-send-mail@v3
        with:
         server_address: smtp.gmail.com
         server_port: 465
         secure: true
         username: ${{ secrets.MAIL_USERNAME }}
         password: ${{ secrets.MAIL_PASSWORD }}
         subject: "🚨 PRISM Build Failure"
         to: prism.bot11@gmail.com
         from: PRISM Bot
         body: |
          AI RCA report attached.
         attachments: rca-*.md

      - name: Fail Pipeline
        if: steps.build.outcome == 'failure' || steps.docker.outcome == 'failure'

        run: |
          exit 1