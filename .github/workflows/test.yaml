name: PRISM CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

permissions:
  contents: read
  pull-requests: write

jobs:

  build:

    if: contains(
      github.event.pull_request.labels.*.name,
      'build:run'
      )

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Verify Maven Wrapper
        run: chmod +x mvnw

      - name: Build Application
        id: build
        continue-on-error: true
        run: |
          ./mvnw clean package > build.log 2>&1

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Install Gemini SDK
        if: always()  ##in reality it will run only when the build fails, but we want to run it always to ensure the SDK is available for RCA generation
        run: |
           python -m pip install --upgrade pip
           pip install google-generativeai


      - name: Generate RCA
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/failure_analysis.py


      - name: Publish RCA Summary
        if: always()
        run: |
          echo "## 🚨 PRISM RCA Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat rca_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Verify RCA File
        if: always()
        run: |
           pwd
           ls -la
           cat rca.md

      - name: Rename RCA
        run: |
         SHORT_SHA=$(git rev-parse --short HEAD)
         mv rca.md rca-${SHORT_SHA}.md

      - name: Upload RCA
        uses: actions/upload-artifact@v4
        with:
            name: rca-${{ github.sha }}
            path: rca-*.md

      - name: Fail Pipeline
        if: steps.build.outcome == 'failure'

        run: |
          exit 1