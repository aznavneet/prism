name: PRISM CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

permissions:
  contents: read
  pull-requests: write

jobs:

  build:

    if: contains(github.event.pull_request.labels.*.name, 'build:run')

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Verify Maven Wrapper
        run: chmod +x mvnw
        
      - name: Build App
        id: build
        continue-on-error: true
        run: |
            ./mvnw clean package > build.log 2>&1

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: prism-artifacts
          path: |
            target/*.jar

      - name: Build Summary
        if: success()
        run: |
          echo "PRISM Build Successful"
          echo "Branch: ${{ github.head_ref }}"
          echo "PR Number: ${{ github.event.pull_request.number }}"