name: PRISM CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

permissions:
  contents: read
  pull-requests: write

jobs:

  build:

    if: contains(
      github.event.pull_request.labels.*.name,
      'build:run'
      )

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Verify Maven Wrapper
        run: chmod +x mvnw

      - name: Build Application
        id: build
        continue-on-error: true
        run: |
          ./mvnw clean package > build.log 2>&1

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Install Gemini SDK
        if: steps.build.outcome == 'failure'
        run: |
           python -m pip install --upgrade pip
            pip install import google.generativeai


      - name: Generate RCA
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/failure_analysis.py

      - name: Verify RCA File
        if: always()
        run: |
           pwd
           ls -la
           cat rca.md

      - name: Upload RCA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rca-report
          path: rca.md

      - name: Fail Pipeline
        if: steps.build.outcome == 'failure'

        run: |
          exit 1